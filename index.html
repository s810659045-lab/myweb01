<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>중국 경관 소개 - 인터랙티브 페이지</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 250%; /* 콘텐츠 길이에 맞춰 조정 */
            background: #000;
            overflow-x: hidden;
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* 배경 비디오 컨테이너 */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -3;
            overflow: hidden;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 영상을 화면에 꽉 채움 */
        }

        /* 영상 위 어두운 오버레이 (글자 가독성 확보) */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.3);
            z-index: -2;
        }

        /* 입자 애니메이션 캔버스 */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            pointer-events: none;
        }

        .content {
            position: relative;
            color: white;
            text-align: center;
            padding-top: 45vh;
            font-size: 2.5rem;
            text-shadow: 0px 4px 15px rgba(0,0,0,0.8);
        }

        .description {
            position: relative;
            margin-top: 100vh;
            color: white;
            font-size: 1.3rem;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px); /* 배경 살짝 흐리게 */
            padding: 80px 20px;
            text-align: center;
            line-height: 1.8;
        }

        h1 { margin: 0; font-size: 4rem; letter-spacing: 5px; }
        p { font-weight: 300; }
    </style>
</head>
<body>

    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="KakaoTalk_20260331_200812123.mp4" type="video/mp4">
            브라우저가 비디오 태그를 지원하지 않습니다.
        </video>
    </div>
    
    <div class="overlay"></div>
    <canvas id="particleCanvas"></canvas>

    <div class="content">
        <h1>중국의 비경(祕境)</h1>
        <p>스크롤을 내려 신비로운 풍경을 탐험하세요</p>
    </div>

    <div class="description">
        <h2>천하절경, 장가계 (Zhangjiajie)</h2>
        <p>영화 '아바타'의 영감이 된 이곳은 구름 위로 솟은 수만 개의 기암괴석이 장관을 이룹니다.<br>
        자연이 빚어낸 거대한 예술품 사이로 흐르는 안개는 마치 신선이 사는 듯한 신비로움을 선사합니다.</p>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init();
            }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height + canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedY = Math.random() * 1 + 0.3;
                this.opacity = Math.random() * 0.6 + 0.1;
            }
            update() {
                let speedMultiplier = 1 + (window.scrollY * 0.003);
                this.y -= this.speedY * speedMultiplier;
                if (this.y < -10) this.init();
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 120; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
